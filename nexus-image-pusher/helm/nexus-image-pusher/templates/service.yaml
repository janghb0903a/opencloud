apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus-image-pusher.fullname" . }}
  labels:
    {{- include "nexus-image-pusher.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "nexus-image-pusher.selectorLabels" . | nindent 4 }}
