replicaCount: 1

image:
  repository: registry.example.com/monitoring/openstack-vm-name-exporter
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 9189
  targetPort: 9189

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

envConfig:
  POLL_INTERVAL: "60"
  PORT: "9189"
  OS_CLOUD: ""

secret:
  create: true
  existingSecret: ""
  data:
    OS_AUTH_URL: "https://keystone.example.com:5000/v3"
    OS_IDENTITY_API_VERSION: "3"
    OS_AUTH_TYPE: "v3password"
    OS_USERNAME: "monitoring"
    OS_PASSWORD: "change-me"
    OS_PROJECT_NAME: "admin"
    OS_USER_DOMAIN_NAME: "Default"
    OS_PROJECT_DOMAIN_NAME: "Default"
    # Optional if private CA is used.
    # OS_CACERT: "/etc/ssl/certs/custom-ca.crt"

extraEnv: []

serviceMonitor:
  enabled: false
  namespace: ""
  labels: {}
  interval: 60s
  scrapeTimeout: 10s
  path: /metrics
