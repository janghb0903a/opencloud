apiVersion: v1
kind: Service
metadata:
  name: {{ include "openstack-vm-name-exporter.fullname" . }}
  labels:
    {{- include "openstack-vm-name-exporter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "openstack-vm-name-exporter.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
