apiVersion: v1
kind: Service
metadata:
  name: {{ include "oss-report-agent.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "oss-report-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "oss-report-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8000
